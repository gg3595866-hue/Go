<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Witch Analyzer</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      background: #2a2a4a;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    .status-dot.disconnected {
      background: #f87171;
      box-shadow: 0 0 8px #f87171;
    }
    .status-dot.connecting {
      background: #fbbf24;
      box-shadow: 0 0 8px #fbbf24;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text {
      font-weight: 500;
    }
    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: #2a2a4a;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.primary {
      background: #6366f1;
      color: white;
    }
    button.primary:hover {
      background: #5558dd;
    }
    button.secondary {
      background: #3a3a5a;
      color: #fff;
      margin-top: 8px;
    }
    button.secondary:hover {
      background: #4a4a6a;
    }
    .info {
      font-size: 12px;
      color: #888;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #3a3a5a;
    }
    .version {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Witch Analyzer</h1>
  
  <div class="status">
    <div id="statusDot" class="status-dot disconnected"></div>
    <span id="statusText" class="status-text">Disconnected</span>
  </div>
  
  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="https://your-repl.replit.app">
  
  <button id="connectBtn" class="primary">Connect</button>
  <button id="reconnectBtn" class="secondary">Reconnect</button>
  
  <div class="info">
    Enter your Witch Analyzer server URL and click Connect. 
    The extension works on so.1xbet.com and 1x-bet.mobi.
  </div>
  
  <div class="version">v5.9</div>
  
  <script src="popup.js"></script>
</body>
</html>
